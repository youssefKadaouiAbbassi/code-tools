name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0). Must already exist."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve ref (tag from push or workflow_dispatch input)
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"
      - name: Verify package.json version matches tag
        run: |
          pkg_version=$(jq -r .version package.json)
          tag_version="${{ steps.resolve.outputs.ref }}"
          tag_version="${tag_version#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag ($tag_version)"
            exit 1
          fi
      - run: bun install --frozen-lockfile
      - run: bun tsc --noEmit
      - run: bun test tests/unit tests/integration tests/scenarios
      - name: Pack dry-run (inspect tarball contents)
        run: bun pm pack --dry-run

  publish-npm:
    name: Publish to npm (OIDC trusted publishing)
    runs-on: ubuntu-latest
    needs: [verify]
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.verify.outputs.ref }}
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: npm install -g npm@latest
      - run: npm publish --access public --provenance

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [verify, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.verify.outputs.ref }}
          persist-credentials: false
          fetch-depth: 0
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.ref }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.verify.outputs.ref, '-') }}
