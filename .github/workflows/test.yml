name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test tests/unit
      - run: bun test tests/integration

  lint-hooks:
    name: Shellcheck Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck configs/hooks/*.sh configs/project-claude/hooks/*.sh
      - run: shellcheck bootstrap.sh

  e2e-ubuntu:
    name: E2E (Ubuntu Docker)
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test tests/e2e
    timeout-minutes: 15

  bats-ubuntu:
    name: BATS Post-Install Verification (Ubuntu)
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: sudo apt-get install -y bats jq
      - run: bun install
      - run: bun run bin/setup.ts --non-interactive --tier primordial
      - run: bats tests/ci/verify.bats

  bats-macos:
    name: BATS Post-Install Verification (macOS)
    runs-on: macos-14
    if: github.ref == 'refs/heads/master'
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: brew install bats-core jq
      - run: bun install
      - run: bun run bin/setup.ts --non-interactive --tier primordial
      - run: bats tests/ci/verify.bats
