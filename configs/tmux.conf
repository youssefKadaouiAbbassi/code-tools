# Claude-optimized tmux configuration
# Prefix: C-a (screen-style)

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Terminal ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- General ---
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on

# --- Mouse ---
set -g mouse on

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

# --- Splits (intuitive) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation with Alt+arrows (no prefix needed) ---
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Pane resizing with prefix + arrows ---
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# --- Window navigation ---
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Status bar ---
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=#1a1b26,fg=#a9b1d6"

set -g status-left-length 40
set -g status-left "#[fg=#7aa2f7,bold]#S #[fg=#565f89]| "

set -g status-right-length 60
set -g status-right "#[fg=#565f89]%Y-%m-%d #[fg=#a9b1d6,bold]%H:%M"

setw -g window-status-format         "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold,bg=#24283b] #I:#W #[default]"

# --- Pane borders ---
set -g pane-border-style        "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# --- Message style ---
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
